<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Onboarding Experiments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: #f9f9fb; color: #15141a; font-size: 15px; min-height: 100vh;
    }

    /* ── HEADER ── */
    .page-header {
      background: #fff; border-bottom: 1px solid #e0e0e6;
      padding: 0 48px; display: flex; align-items: center; gap: 16px; height: 64px;
    }
    .page-header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .page-header-title { font-size: 17px; font-weight: 600; color: #15141a; }
    .page-header-sep { width: 1px; height: 20px; background: #e0e0e6; }
    .page-header-sub { font-size: 13px; color: #5b5b66; }
    .page-header-nav { display: flex; gap: 4px; margin-left: auto; }
    .nav-link {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500; text-decoration: none; color: #5b5b66;
      transition: background .12s, color .12s;
    }
    .nav-link:hover { background: #f0f0f4; color: #15141a; }
    .nav-link.active { background: #e8f0fe; color: #0062f9; }

    /* ── TABS ── */
    .tab-bar {
      background: #fff; border-bottom: 1px solid #e0e0e6;
      padding: 0 48px; display: flex; gap: 0;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 8px; padding: 0 4px; height: 48px;
      margin-right: 24px; background: none; border: none; border-bottom: 2px solid transparent;
      font-size: 14px; font-weight: 500; color: #5b5b66; cursor: pointer;
      font-family: inherit; transition: color .12s, border-color .12s;
      position: relative; top: 1px;
    }
    .tab-btn:hover { color: #15141a; }
    .tab-btn.active { color: #0062f9; border-bottom-color: #0062f9; }
    .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 18px; padding: 0 5px; border-radius: 9px;
      background: #f0f0f4; color: #5b5b66; font-size: 11px; font-weight: 700;
    }
    .tab-btn.active .tab-count { background: #d6e4ff; color: #0062f9; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── MAIN ── */
    .page-body { max-width: 1200px; margin: 0 auto; padding: 32px 48px 80px; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .search-wrap { position: relative; flex: 1; max-width: 360px; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #8f8f9d; pointer-events: none; }
    .search-input {
      width: 100%; height: 36px; padding: 0 12px 0 34px;
      background: #fff; border: 1.5px solid #cfcfd8; border-radius: 8px;
      font-size: 13px; color: #15141a; outline: none; font-family: inherit;
    }
    .search-input:focus { border-color: #0062f9; }
    .search-input::placeholder { color: #8f8f9d; }
    .filter-group { display: flex; gap: 6px; }
    .filter-btn {
      height: 36px; padding: 0 14px; background: #fff;
      border: 1.5px solid #cfcfd8; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #5b5b66; cursor: pointer; font-family: inherit;
      transition: border-color .12s, color .12s, background .12s;
    }
    .filter-btn:hover { color: #15141a; background: #f9f9fb; }
    .filter-btn.active { border-color: #0062f9; color: #0062f9; background: #f0f5ff; }
    .result-count { font-size: 13px; color: #8f8f9d; margin-left: auto; }

    /* ── LOCAL SCENARIO CARDS ── */
    .exp-group { margin-bottom: 40px; }
    .group-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 700; color: #5b5b66;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px;
    }
    .group-label::after { content: ''; flex: 1; height: 1px; background: #e0e0e6; }
    .group-os-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
      border-radius: 100px; font-size: 11px; font-weight: 600; background: #f0f0f4;
      color: #5b5b66; text-transform: none; letter-spacing: 0;
    }
    .scenario-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
    .scenario-card {
      background: #fff; border: 1.5px solid #e0e0e6; border-radius: 10px;
      padding: 18px 20px 16px; display: flex; flex-direction: column; gap: 14px;
      transition: box-shadow .15s, border-color .15s;
    }
    .scenario-card:hover { box-shadow: 0 2px 12px rgba(21,20,26,.1); border-color: #cfcfd8; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .scenario-name { font-size: 14px; font-weight: 600; color: #15141a; line-height: 1.4; }
    .scenario-id { font-size: 11px; color: #8f8f9d; font-family: ui-monospace, monospace; margin-top: 2px; word-break: break-all; }
    .card-copy {
      width: 28px; height: 28px; flex-shrink: 0; background: transparent; border: none;
      border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #8f8f9d; transition: background .12s, color .12s;
    }
    .card-copy:hover { background: #f0f0f4; color: #15141a; }
    .screen-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
    .screen-pill {
      display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500; line-height: 1.4;
      background: #f0f5ff; color: #0062f9; white-space: nowrap;
    }
    .screen-pill.pill-first { background: #e8f8f5; color: #2ac3a2; }
    .screen-pill.pill-tail { background: #f0f0f4; color: #5b5b66; }
    .flow-arrow { color: #cfcfd8; font-size: 10px; flex-shrink: 0; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid #f0f0f4;
    }
    .screen-count { font-size: 12px; color: #8f8f9d; }
    .btn-preview {
      display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px;
      background: #0062f9; color: #fff; font-size: 13px; font-weight: 600;
      border: none; border-radius: 6px; cursor: pointer; text-decoration: none;
      font-family: inherit; transition: background .12s;
    }
    .btn-preview:hover { background: #0050d1; }

    /* ── NIMBUS SECTION ── */
    .nimbus-status {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; padding: 12px 16px;
      background: #fff; border: 1px solid #e0e0e6; border-radius: 8px;
    }
    .nimbus-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .nimbus-dot.live { background: #2ac3a2; box-shadow: 0 0 0 3px rgba(42,195,162,.2); }
    .nimbus-dot.loading { background: #cfcfd8; animation: pulse .9s ease-in-out infinite alternate; }
    .nimbus-dot.error { background: #e22850; }
    @keyframes pulse { to { opacity: .3; } }
    .nimbus-status-text { font-size: 13px; color: #5b5b66; flex: 1; }
    .nimbus-status-text strong { color: #15141a; }
    .btn-refresh {
      display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 12px;
      background: transparent; border: 1.5px solid #cfcfd8; border-radius: 6px;
      font-size: 12px; font-weight: 500; color: #5b5b66; cursor: pointer; font-family: inherit;
      transition: border-color .12s, color .12s;
    }
    .btn-refresh:hover { border-color: #8f8f9d; color: #15141a; }
    .btn-refresh.spinning svg { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Nimbus experiment card */
    .nimbus-grid { display: flex; flex-direction: column; gap: 12px; }
    .nimbus-card {
      background: #fff; border: 1.5px solid #e0e0e6; border-radius: 10px; overflow: hidden;
    }
    .nimbus-card-head {
      padding: 16px 20px 14px; border-bottom: 1px solid #f0f0f4;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .nimbus-card-info { flex: 1; min-width: 0; }
    .nimbus-exp-name { font-size: 14px; font-weight: 600; color: #15141a; line-height: 1.4; margin-bottom: 3px; }
    .nimbus-exp-slug { font-size: 11px; color: #8f8f9d; font-family: ui-monospace, monospace; }
    .nimbus-exp-desc { font-size: 12px; color: #5b5b66; margin-top: 6px; line-height: 1.5; }
    .nimbus-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600;
    }
    .badge-live { background: #e8f8f5; color: #2ac3a2; }
    .badge-paused { background: #f0f0f4; color: #8f8f9d; }
    .badge-rollout { background: #fff3cd; color: #a67c00; }
    .badge-date { background: #f0f0f4; color: #5b5b66; font-weight: 500; }
    .nimbus-card-body { padding: 0; }

    /* Branch rows */
    .branch-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid #f9f9fb;
    }
    .branch-row:last-child { border-bottom: none; }
    .branch-slug {
      font-size: 12px; font-weight: 600; font-family: ui-monospace, monospace;
      color: #15141a; min-width: 100px; flex-shrink: 0;
    }
    .branch-slug.control { color: #8f8f9d; }
    .branch-screens { flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 3px; }
    .branch-no-screens { font-size: 12px; color: #8f8f9d; font-style: italic; }
    .branch-cond { font-size: 11px; color: #8f8f9d; margin-left: 6px; white-space: nowrap; }
    .screen-pill.pill-edge { background: #f0f0f4; color: #8f8f9d; }
    .branch-pill {
      display: inline-flex; padding: 2px 7px; border-radius: 3px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
      background: #f0f5ff; color: #0062f9;
    }
    .branch-pill.first { background: #e8f8f5; color: #2ac3a2; }
    .branch-pill.tail { background: #f0f0f4; color: #5b5b66; }
    .branch-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-branch-preview {
      display: inline-flex; align-items: center; gap: 5px; height: 28px; padding: 0 12px;
      background: #0062f9; color: #fff; font-size: 12px; font-weight: 600;
      border: none; border-radius: 5px; cursor: pointer; font-family: inherit;
      transition: background .12s; white-space: nowrap;
    }
    .btn-branch-preview:hover { background: #0050d1; }
    .btn-branch-copy {
      width: 28px; height: 28px; background: transparent; border: none; border-radius: 5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #8f8f9d; transition: background .12s, color .12s;
    }
    .btn-branch-copy:hover { background: #f0f0f4; color: #15141a; }

    /* Message feature chips (post-onboarding asRouter messages) */
    .branch-msg-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 3px; margin-left: 6px; }
    .branch-msg-sep { width: 1px; height: 14px; background: #e0e0e6; margin: 0 4px; flex-shrink: 0; }
    .msg-chip {
      display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px;
      background: #fff3cd; color: #a67c00; border-radius: 3px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }
    .msg-chip-icon { font-style: normal; font-size: 10px; }

    /* Empty / loading states */
    .state-box {
      text-align: center; padding: 64px 0; color: #8f8f9d; font-size: 14px;
    }
    .state-box p { margin-top: 8px; font-size: 13px; color: #8f8f9d; }
    .state-box a { color: #0062f9; }
    .empty-state { text-align: center; padding: 64px 0; color: #8f8f9d; font-size: 14px; display: none; }
    .empty-state.visible { display: block; }
  </style>
</head>

<script src="stubs.js"></script>
<script>
  // ── TABS ──────────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  }

  // ── SCREEN STEP TYPES ─────────────────────────────────────────────────────
  // edgeCase: true = only appears for specific rare user states (device migration,
  // backup found, language mismatch). Won't fire for typical new profiles even if
  // the screen is in the recipe.
  const STEP_TYPES = [
    { pattern: /^AW_EASY_SETUP/,    label: "Easy Setup",     tail: false, edgeCase: false },
    { pattern: /^AW_SMART_WINDOW/,  label: "Smart Window",   tail: false, edgeCase: true  },
    { pattern: /^AW_IMPORT/,        label: "Import",         tail: true,  edgeCase: false },
    { pattern: /^AW_AMO/,           label: "Add-ons",        tail: true,  edgeCase: false },
    { pattern: /^AW_ACCOUNT/,       label: "Account",        tail: true,  edgeCase: false },
    { pattern: /^AW_GRATITUDE/,     label: "Thank you",      tail: true,  edgeCase: true  },
    { pattern: /^RETURN_TO_AMO/,    label: "Return to AMO",  tail: false, edgeCase: true  },
    { pattern: /^AW_WELCOME_BACK/,  label: "Welcome Back",   tail: false, edgeCase: true  },
    { pattern: /^AW_BACKUP_RESTORE/,label: "Backup Restore", tail: false, edgeCase: true  },
    { pattern: /^AW_LANGUAGE/,      label: "Language",       tail: false, edgeCase: true  },
  ];

  function getStepType(id) {
    const match = STEP_TYPES.find(t => t.pattern.test(id));
    if (match) return match;
    const label = id.replace(/^AW_/, '').replace(/_/g, ' ').toLowerCase()
      .replace(/\b\w/g, c => c.toUpperCase());
    return { label, tail: false, edgeCase: false };
  }

  function screenLabel(id) { return getStepType(id).label; }

  // Returns { core, conditional } — core steps are what a typical new-profile user
  // sees; conditional steps require rare targeting (device migration, backup, etc.)
  function deduplicateSteps(screens) {
    const core        = [];
    const conditional = [];
    const seen        = new Set();
    for (const s of screens) {
      const id   = typeof s === 'string' ? s : (s.id || '');
      const type = getStepType(id);
      if (seen.has(type.label)) continue;
      seen.add(type.label);
      if (type.edgeCase) conditional.push(type);
      else               core.push(type);
    }
    return { core, conditional };
  }

  // ── NIMBUS ────────────────────────────────────────────────────────────────
  const API = 'https://experimenter.services.mozilla.com/api/v6/experiments/?status=Live&feature_config=aboutwelcome';

  function getAWFeature(branch) {
    return branch.features?.find(f => f.featureId === 'aboutwelcome') || null;
  }

  // Detect asRouter message features that fire after onboarding completes
  const MSG_FEATURES = [
    { pattern: /^featureCallout$/,  label: 'Callout' },
    { pattern: /^spotlight$/,       label: 'Spotlight' },
    { pattern: /^fxms-message-\d+/, label: 'Message' },
    { pattern: /^infobar$/,         label: 'Infobar' },
    { pattern: /^pbNewtab$/,        label: 'Private NTP' },
    { pattern: /^newtabPromo/,      label: 'NTP Promo' },
  ];

  function getMsgFeatureInfo(featureId) {
    const m = MSG_FEATURES.find(x => x.pattern.test(featureId));
    if (!m) return null;
    let label = m.label;
    if (/^fxms-message-(\d+)$/.test(featureId)) {
      label = `Msg ${featureId.replace('fxms-message-', '')}`;
    }
    return { featureId, label };
  }

  function getBranchMsgFeatures(branch) {
    return (branch.features || [])
      .filter(f => getMsgFeatureInfo(f.featureId) !== null)
      .map(f => ({ ...getMsgFeatureInfo(f.featureId), value: f.value }));
  }

  function buildBranchPills(screens) {
    if (!screens?.length) return '<span class="branch-no-screens">No screen changes (default flow)</span>';
    const { core, conditional } = deduplicateSteps(screens);
    const pills = core.map((step, i) => {
      const cls   = i === 0 ? 'branch-pill first' : step.tail ? 'branch-pill tail' : 'branch-pill';
      const arrow = i < core.length - 1 ? '<span class="flow-arrow" style="color:#cfcfd8;font-size:10px;margin:0 1px">›</span>' : '';
      return `<span class="${cls}">${step.label}</span>${arrow}`;
    }).join('');
    const condNote = conditional.length
      ? `<span class="branch-cond" title="${conditional.map(s => s.label).join(', ')}">+ ${conditional.map(s => s.label).join(', ')}</span>`
      : '';
    return pills + condNote;
  }

  // Filter a branch's screens down to one representative screen per step type,
  // skipping edge-case screens — so the preview shows the typical new-profile journey.
  function getCoreScreens(screens) {
    if (!screens?.length) return screens;
    const seen = new Set();
    const result = [];
    for (const s of screens) {
      const id   = typeof s === 'string' ? s : (s.id || '');
      const type = getStepType(id);
      if (type.edgeCase) continue;
      if (seen.has(type.label)) continue;
      seen.add(type.label);
      result.push(s);
    }
    return result;
  }

  function previewBranch(expName, branchSlug, screens, msgFeatures) {
    const coreScreens = getCoreScreens(screens);
    sessionStorage.setItem('nimbus-preview', JSON.stringify({ expName, branchSlug, screens: coreScreens, msgFeatures: msgFeatures || [] }));
    window.open('index.html?nimbus=1', '_blank');
  }

  function buildNimbusCard(exp) {
    const card = document.createElement('div');
    card.className = 'nimbus-card';

    const isRollout = exp.isRollout;
    const isPaused  = exp.isEnrollmentPaused;
    const start     = exp.startDate ? new Date(exp.startDate).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : null;
    const statusBadge = isPaused
      ? '<span class="badge badge-paused">Enrollment paused</span>'
      : '<span class="badge badge-live">● Enrolling</span>';
    const rolloutBadge = isRollout ? '<span class="badge badge-rollout">Rollout</span>' : '';
    const dateBadge    = start ? `<span class="badge badge-date">Started ${start}</span>` : '';

    card.innerHTML = `
      <div class="nimbus-card-head">
        <div class="nimbus-card-info">
          <div class="nimbus-exp-name">${exp.name || exp.slug}</div>
          <div class="nimbus-exp-slug">${exp.slug}</div>
          ${exp.publicDescription ? `<div class="nimbus-exp-desc">${exp.publicDescription}</div>` : ''}
          <div class="nimbus-badges">${statusBadge}${rolloutBadge}${dateBadge}</div>
        </div>
      </div>
      <div class="nimbus-card-body" id="branches-${CSS.escape(exp.slug)}"></div>
    `;

    const body = card.querySelector(`#branches-${CSS.escape(exp.slug)}`);

    exp.branches.forEach(branch => {
      const awFeat     = getAWFeature(branch);
      const screens    = awFeat?.value?.screens || null;
      const hasScreens = screens?.length > 0;
      const msgFeats   = getBranchMsgFeatures(branch);
      const hasMsgs    = msgFeats.length > 0;

      const row = document.createElement('div');
      row.className = 'branch-row';
      const isCtrl = branch.slug === 'control';

      const msgChipsHtml = hasMsgs
        ? `<span class="branch-msg-sep"></span><span class="branch-msg-chips">${
            msgFeats.map(f => `<span class="msg-chip" title="${f.featureId}">${f.label}</span>`).join('')
          }</span>`
        : '';

      const canPreview = hasScreens || hasMsgs;

      row.innerHTML = `
        <span class="branch-slug${isCtrl ? ' control' : ''}">${branch.slug}</span>
        <div class="branch-screens">${buildBranchPills(screens)}${msgChipsHtml}</div>
        <div class="branch-actions">
          ${canPreview ? `<button class="btn-branch-preview">Preview ↗</button>` : ''}
          <button class="btn-branch-copy" title="Copy branch slug">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V3a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      `;

      if (canPreview) {
        row.querySelector('.btn-branch-preview').addEventListener('click', () => {
          previewBranch(exp.name || exp.slug, branch.slug, screens, msgFeats);
        });
      }
      row.querySelector('.btn-branch-copy').addEventListener('click', function() {
        navigator.clipboard.writeText(branch.slug).catch(() => {});
        this.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3 3 6-6" stroke="#2ac3a2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        setTimeout(() => {
          this.innerHTML = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V3a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
        }, 1500);
      });

      body.appendChild(row);
    });

    return card;
  }

  async function loadNimbus() {
    const dot    = document.getElementById('nimbusDot');
    const text   = document.getElementById('nimbusStatusText');
    const grid   = document.getElementById('nimbusGrid');
    const empty  = document.getElementById('nimbusEmpty');
    const errBox = document.getElementById('nimbusError');
    const btn    = document.getElementById('refreshBtn');
    const count  = document.getElementById('nimbusCount');

    dot.className = 'nimbus-dot loading';
    text.innerHTML = 'Fetching live experiments from Nimbus…';
    btn.classList.add('spinning');
    grid.innerHTML = '';
    empty.style.display = 'none';
    errBox.style.display = 'none';

    try {
      const res  = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Filter to experiments that have at least one aboutwelcome branch with screens
      const exps = data.filter(exp =>
        exp.branches?.some(b => getAWFeature(b) !== null)
      );

      if (exps.length === 0) {
        empty.style.display = 'block';
        dot.className = 'nimbus-dot live';
        text.innerHTML = '<strong>Nimbus connected</strong> · No live aboutwelcome experiments right now.';
      } else {
        exps.forEach(exp => grid.appendChild(buildNimbusCard(exp)));
        const withScreens = exps.reduce((n, e) =>
          n + e.branches.filter(b => getAWFeature(b)?.value?.screens?.length > 0).length, 0);
        dot.className = 'nimbus-dot live';
        const fetchedAt = new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
        text.innerHTML = `<strong>Nimbus connected</strong> · ${exps.length} aboutwelcome experiment${exps.length !== 1 ? 's' : ''} · ${withScreens} previewable branch${withScreens !== 1 ? 'es' : ''} · Updated ${fetchedAt}`;
        count.textContent = exps.length;
        document.getElementById('nimbusCount').textContent = exps.length;
      }
    } catch (err) {
      console.error('Nimbus fetch failed:', err);
      dot.className = 'nimbus-dot error';
      text.innerHTML = `<strong>Could not connect to Nimbus</strong> · ${err.message}`;
      errBox.style.display = 'block';
      count.textContent = '!';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── LOCAL SCENARIOS ───────────────────────────────────────────────────────
  function buildCard(scenario) {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.dataset.name = scenario.label.toLowerCase();
    card.dataset.id   = scenario.id;

    // Local scenarios are already scoped to a specific user state, so show all
    // steps including edge-case ones (e.g. device-migration scenario shows Welcome Back)
    const { core, conditional } = deduplicateSteps(scenario.screens);
    const allSteps = [...core, ...conditional];
    const pillsHtml = allSteps.map((step, i) => {
      const cls   = i === 0 ? 'screen-pill pill-first' : step.tail ? 'screen-pill pill-tail' : step.edgeCase ? 'screen-pill pill-edge' : 'screen-pill';
      const arrow = i < allSteps.length - 1 ? `<span class="flow-arrow">›</span>` : '';
      return `<span class="${cls}">${step.label}</span>${arrow}`;
    }).join('');

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="scenario-name">${scenario.label}</div>
          <div class="scenario-id">${scenario.id}</div>
        </div>
        <button class="card-copy" title="Copy scenario ID" data-copy="${scenario.id}">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V3a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="screen-flow">${pillsHtml}</div>
      <div class="card-footer">
        <span class="screen-count">${allSteps.length} steps</span>
        <a class="btn-preview" href="index.html?scenario=${scenario.id}" target="_blank">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8.5 1.5H11.5V4.5M11.5 1.5L6.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Preview
        </a>
      </div>
    `;
    card.querySelector('.card-copy').addEventListener('click', function() {
      navigator.clipboard.writeText(this.dataset.copy).catch(() => {});
      this.classList.add('copied');
      this.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke="#2ac3a2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      setTimeout(() => {
        this.classList.remove('copied');
        this.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V3a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
      }, 1600);
    });
    return card;
  }

  function renderLocal() {
    const gallery     = document.getElementById('gallery');
    const activeGroup = document.querySelector('.filter-btn.active')?.dataset.group || 'all';
    const query       = document.getElementById('searchInput').value.toLowerCase().trim();
    gallery.innerHTML = '';
    let total = 0, visible = 0;

    SCENARIOS.groups.forEach(group => {
      total += group.items.length;
      if (activeGroup !== 'all' && group.label !== activeGroup) return;
      const items = group.items.filter(s => !query || s.label.toLowerCase().includes(query) || s.id.includes(query));
      if (!items.length) return;
      visible += items.length;
      const section = document.createElement('div');
      section.className = 'exp-group';
      section.innerHTML = `<div class="group-label"><span class="group-os-badge">${group.label}</span></div><div class="scenario-grid"></div>`;
      const grid = section.querySelector('.scenario-grid');
      items.forEach(s => grid.appendChild(buildCard(s)));
      gallery.appendChild(section);
    });

    document.getElementById('resultCount').textContent =
      query || activeGroup !== 'all' ? `${visible} of ${total} scenarios` : `${total} scenarios`;
    document.getElementById('emptyState').classList.toggle('visible', visible === 0);
    document.getElementById('localCount').textContent = total;
  }

  function buildFilters() {
    const wrap = document.getElementById('filterGroup');
    ['All', ...SCENARIOS.groups.map(g => g.label)].forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (label === 'All' ? ' active' : '');
      btn.textContent = label;
      btn.dataset.group = label === 'All' ? 'all' : label;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderLocal();
      });
      wrap.appendChild(btn);
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderLocal);
  buildFilters();
  renderLocal();
  loadNimbus();
</script>
</body>
